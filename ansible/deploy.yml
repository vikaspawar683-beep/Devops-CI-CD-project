---
- hosts: server
  become: true

  tasks:

  - name: Install Docker
    apt:
      name: docker.io
      state: present
      update_cache: yes

  - name: Start Docker
    service:
      name: docker
      state: started
      enabled: yes

  - name: Run Container
    command: docker run -d -p 8080:8080 java-app
