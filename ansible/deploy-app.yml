- name: Deploy Java app container
  hosts: app_servers
  become: yes

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Enable Docker service
      systemd:
        name: docker
        enabled: yes
        state: started

    - name: Create app directory
      file:
        path: /home/ubuntu/app
        state: directory
        mode: '0755'

    - name: Copy JAR file
      copy:
        src: target/myapp-1.0.jar
        dest: /home/ubuntu/app/myapp.jar

    - name: Copy Dockerfile
      copy:
        src: Dockerfile
        dest: /home/ubuntu/app/Dockerfile

    - name: Remove old container if exists
      shell: docker rm -f java-app || true

    - name: Remove old image if exists
      shell: docker rmi -f java-app:latest || true

    - name: Build Docker image
      shell: docker build -t java-app:latest /home/ubuntu/app

    - name: Run Docker container
      shell: docker run -d --name java-app -p 8080:8080 java-app:latest
