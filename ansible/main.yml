---
- name: Install Docker
  apt:
    name: docker.io
    state: present
    update_cache: yes

- name: Start Docker
  service:
    name: docker
    state: started
    enabled: true

- name: Pull Docker Image
  docker_container:
    name: myapp
    image: myapp:latest
    state: started
    ports:
      - "8080:8080"
